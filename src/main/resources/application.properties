spring.application.name=demo
spring.datasource.url=jdbc:h2:mem:salesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true
mybatis.mapper-scan=com.example.demo.repository
spring.sql.init.mode=always
gemini.api.key=${GEMINI_API_KEY:sua_chave_padrao_aqui}
mybatis.configuration.map-underscore-to-camel-case=true
jwt.secret=${JWT_SECRET:MINHA_CHAVE_SECRETA_PADRAO_MUITO_SEGURA_COM_NO_MINIMO_32_CARACTERES}
